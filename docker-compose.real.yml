services:
  agentic-sdlc-platform:
    environment:
      ASDLC_MULTICA_HTTP_ENABLED: "true"
      ASDLC_MULTICA_BASE_URL: http://host.docker.internal:18080
      ASDLC_MULTICA_API_KEY: ${ASDLC_MULTICA_API_KEY:?Set ASDLC_MULTICA_API_KEY in .env.local}
      ASDLC_MULTICA_WORKSPACE_ID: ${ASDLC_MULTICA_WORKSPACE_ID:?Set ASDLC_MULTICA_WORKSPACE_ID in .env.local}
      ASDLC_MULTICA_DEFAULT_RUNTIME_PROVIDER: ${ASDLC_MULTICA_DEFAULT_RUNTIME_PROVIDER:-codex}
      ASDLC_MULTICA_AGENT_NAME_PREFIX: ${ASDLC_MULTICA_AGENT_NAME_PREFIX:-agentic-sdlc}
      ASDLC_VENDOR_HTTP_ENABLED: ${ASDLC_VENDOR_HTTP_ENABLED:-true}
      ASDLC_MODEL_PROVIDER: ${ASDLC_MODEL_PROVIDER:-openai}
      ASDLC_OPENAI_BASE_URL: ${ASDLC_OPENAI_BASE_URL:-https://api.openai.com/v1}
      ASDLC_OPENAI_API_KEY: ${ASDLC_OPENAI_API_KEY:?Set ASDLC_OPENAI_API_KEY in .env.local}
      ASDLC_OPENAI_DEFAULT_MODEL: ${ASDLC_OPENAI_DEFAULT_MODEL:-gpt-5-mini}
      ASDLC_OPENAI_FALLBACK_MODEL: ${ASDLC_OPENAI_FALLBACK_MODEL:-gpt-5}
      ASDLC_HERMES_HTTP_ENABLED: ${ASDLC_HERMES_HTTP_ENABLED:-false}
      ASDLC_HERMES_BASE_URL: ${ASDLC_HERMES_BASE_URL:-}
      ASDLC_HERMES_API_KEY: ${ASDLC_HERMES_API_KEY:-}
      ASDLC_CONVERSATION_SYNC_ENABLED: ${ASDLC_CONVERSATION_SYNC_ENABLED:-true}
      ASDLC_CONVERSATION_SYNC_INTERVAL_SECONDS: ${ASDLC_CONVERSATION_SYNC_INTERVAL_SECONDS:-15}
      ASDLC_CONVERSATION_SYNC_BATCH_SIZE: ${ASDLC_CONVERSATION_SYNC_BATCH_SIZE:-50}
      ASDLC_GRAPHIFY_MODE: ${ASDLC_GRAPHIFY_MODE:-cli}
      ASDLC_GRAPHIFY_COMMAND: ${ASDLC_GRAPHIFY_COMMAND:-uv run --no-dev graphify}
      ASDLC_GRAPHIFY_OUTPUT_ROOT: ${ASDLC_GRAPHIFY_OUTPUT_ROOT:-/graphify-data}
      ASDLC_GRAPHIFY_TIMEOUT_SECONDS: ${ASDLC_GRAPHIFY_TIMEOUT_SECONDS:-300}
    volumes:
      - ${ASDLC_REPO_HOST_ROOT:-..}:/repos:ro
